name: native-batch-core

on:
  push:
    paths:
      - "native/batch_core/**"
      - "scripts/**"
      - ".github/workflows/native-batch-core.yml"
  pull_request:
    paths:
      - "native/batch_core/**"
      - "scripts/**"
      - ".github/workflows/native-batch-core.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SCons
        shell: pwsh
        run: python -m pip install --disable-pip-version-check scons

      - name: Fetch godot-cpp
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/godotengine/godot-cpp.git external/godot-cpp

      - name: Build godot-cpp debug
        shell: pwsh
        working-directory: external/godot-cpp
        run: scons platform=windows target=template_debug generate_bindings=yes -j2

      - name: Build native extension debug
        shell: pwsh
        working-directory: native/batch_core
        run: |
          $lib = Get-ChildItem ..\..\external\godot-cpp\bin -Filter "*debug*.lib" | Select-Object -First 1
          if (-not $lib) { throw "Could not find a debug godot-cpp library" }
          .\build.ps1 -Config Debug -GodotCppDir ..\..\external\godot-cpp -GodotCppLib $lib.FullName

      - name: Build godot-cpp release
        shell: pwsh
        working-directory: external/godot-cpp
        run: scons platform=windows target=template_release generate_bindings=yes -j2

      - name: Build native extension release
        shell: pwsh
        working-directory: native/batch_core
        run: |
          $lib = Get-ChildItem ..\..\external\godot-cpp\bin -Filter "*release*.lib" | Select-Object -First 1
          if (-not $lib) { throw "Could not find a release godot-cpp library" }
          .\build.ps1 -Config Release -GodotCppDir ..\..\external\godot-cpp -GodotCppLib $lib.FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batch-core-windows
          path: |
            native/batch_core/bin/*.dll
